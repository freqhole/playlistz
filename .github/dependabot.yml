# dependabot keeps dependencies fresh by opening PRs in this repo. it runs with
# the repo's own GITHUB_TOKEN (no PAT needed).
#
# noise controls:
#   - minor + patch bumps are grouped into one PR per ecosystem.
#   - a cooldown holds back brand-new releases for a few days, so you are not
#     chasing same-day releases that might get yanked or hot-fixed.
#   - majors stay ungrouped so breaking changes get reviewed one at a time.
version: 2
updates:
  # javascript / typescript deps (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 5
      semver-major-days: 7
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # the workflow actions themselves (actions/checkout, setup-node, etc.).
  # checked monthly and grouped into a single PR - actions change rarely.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci(deps)"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
