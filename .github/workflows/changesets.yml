# on every push to main, run the changesets action:
#   - changesets pending  -> open/update the "Version Packages" PR on
#     changeset-release/main (runs `npm run version` = changeset version).
#     while that PR is open, release.yml builds the DRAFT github release for the
#     upcoming version (tag + notes + standalone bundle).
#   - no changesets pending (that PR was just merged) -> run
#     `npm run release:publish`, which flips the already-built draft release to
#     published. that creates the v$VERSION tag at main HEAD.
#
# the npm package is published separately by npm-publish.yml, which runs on the
# v*.*.* tag (and matches the npm trusted-publisher config). that tag is created
# with GITHUB_TOKEN, so github's recursion guard won't auto-start npm-publish.yml
# -> start it from the run's "approve" button or via workflow_dispatch.
name: changesets

on:
  push:
    branches: [main]

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  version-or-publish:
    name: version PR or publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install deps
        run: npm ci

      - name: configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: changesets - version PR or publish draft release
        uses: changesets/action@v1
        with:
          version: npm run version
          # runs when the version PR merges (no changesets pending). flips the
          # draft github release to published, creating the v$VERSION tag. it
          # does NOT npm-publish; npm-publish.yml does that on the tag.
          publish: npm run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
