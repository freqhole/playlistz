# build the draft github release while the changesets "Version Packages" PR is
# open, so the tag + release notes + standalone bundle are ready the moment the
# PR merges.
#
# triggers (no PAT needed):
#   - push to changeset-release/main (you pushing a commit to the version PR)
#   - the version PR reopened or synchronized (close+reopen it, or push to it)
#   - workflow_dispatch (rebuild a version on demand, e.g. after a flaky run)
# the changesets bot's own push uses GITHUB_TOKEN, which github's recursion
# guard stops from auto-triggering workflows - hence the user-driven levers above
# (push to the PR, close+reopen it, or approve the run from the PR page).
#
# when the version PR merges, changesets.yml flips this draft to published, which
# creates the v$VERSION tag (it does not rebuild anything here).
name: release

on:
  push:
    branches:
      - "changeset-release/main"
  # closing + reopening the version PR, or pushing a commit to it, re-runs the
  # build. (the changesets bot's own push uses GITHUB_TOKEN and is suppressed by
  # github's recursion guard, so these user-driven events are the lever.)
  pull_request:
    types: [reopened, synchronize]
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "version to (re)build, e.g. 0.0.4 (defaults to root package.json)"
        required: false
        type: string

concurrency:
  # normalize push (ref_name) and pull_request (head.ref) for the same branch to
  # one group so the two events don't double-build.
  group: release-build-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  create-release:
    name: create draft release
    # for pull_request events, only the version PR (head changeset-release/main)
    # should build. push + workflow_dispatch always proceed.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.ref == 'changeset-release/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install deps
        run: npm ci

      - name: build
        run: npm run build

      - name: resolve version + tag
        id: meta
        run: |
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ]; then V="$(node -p "require('./package.json').version")"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: create draft release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, leaving it as-is"
          else
            # target main: the tag is created at main HEAD when the draft is
            # published (after the version PR merges).
            gh release create "$TAG" --draft --target main --generate-notes --title "$TAG"
          fi

      # set the draft body to the changeset changelog + github generated notes so
      # the "what changed" text is visible in the draft (not just after publish).
      # idempotent: re-runs on each push to the version PR replace the body.
      - name: set draft release notes (changelog + generated notes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release-notes.mjs "${{ steps.meta.outputs.tag }}"

      # attach the single-file standalone player to the draft. --clobber so
      # re-pushes of the version PR overwrite cleanly.
      - name: upload standalone bundle to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release upload "$TAG" dist/freqhole-playlistz.js --clobber
